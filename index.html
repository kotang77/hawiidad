<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>부의확신</title>
<!-- ===== PWA ===== -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#faf6ec">
<meta name="description" content="2030년까지 700만불 달성 — 포트폴리오 추적 · 실시간 가격 · AI 분석">
<!-- iOS / Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="부의확신">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<!-- Android Chrome / Samsung Internet -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="부의확신">
<style>html,body{background:#faf6ec;overscroll-behavior-y:contain;}
@media (display-mode: standalone) { body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); } }</style>
<script>
  // ── 안전 로깅 헬퍼 (일부 웹뷰에서 console.info 미정의) ──
  var __log = (function(){
    var c = window.console || {};
    var w = (typeof c.warn === "function") ? c.warn.bind(c) :
            (typeof c.log  === "function") ? c.log.bind(c)  : function(){};
    var i = (typeof c.log  === "function") ? c.log.bind(c)  :
            (typeof c.warn === "function") ? c.warn.bind(c) : function(){};
    return { info: i, warn: w };
  })();

  // Service Worker 등록 — PWA 설치 & 오프라인 지원
  // 단, sw.js 가 같은 오리진에 실제 배포돼 있는 환경에서만 시도
  // (claude.ai / claudeusercontent.com 같은 미리보기 환경에서는 404 경고가 나므로 skip)
  (function(){
    if (!("serviceWorker" in navigator)) return;
    var host = location.hostname || "";
    var skipHosts = ["claude.ai", "claudeusercontent.com", "anthropic.com"];
    var isPreview = skipHosts.some(function(h){
      return host === h || host.endsWith("." + h);
    });
    if (isPreview) {
      __log.info("[SW] skipping registration on preview host:", host);
      return;
    }

    // 새 SW가 활성화돼 controller가 바뀌면 즉시 자동 reload (한 번만)
    var __reloaded = false;
    if (navigator.serviceWorker) {
      navigator.serviceWorker.addEventListener("controllerchange", function(){
        if (__reloaded) return;
        __reloaded = true;
        __log.info("[SW] controller changed — reloading for fresh build");
        window.location.reload();
      });
    }

    window.addEventListener("load", function(){
      // sw.js를 직접 register — 실패하면 catch에서 조용히 로깅 (HEAD 프리체크는 일부 호스트에서 false-negative 발생)
      navigator.serviceWorker.register("./sw.js", { scope: "./" })
        .then(function(reg){
          if (!reg) return;
          // 페이지 로드 시 즉시 update 체크 (브라우저 캐시 우회)
          try { reg.update(); } catch(e){}
          // 이미 waiting 중인 SW가 있으면 즉시 적용
          if (reg.waiting && navigator.serviceWorker.controller) {
            reg.waiting.postMessage("SKIP_WAITING");
          }
          // 새 버전 감지 시 자동 활성화
          reg.addEventListener("updatefound", function(){
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", function(){
              if (nw.state === "installed" && navigator.serviceWorker.controller) {
                // 새 SW 대기 중 — skipWaiting 호출 → controllerchange → 자동 reload
                nw.postMessage("SKIP_WAITING");
              }
            });
          });
          // 페이지가 다시 보이게 됐을 때(백그라운드 → 포그라운드)도 update 체크
          document.addEventListener("visibilitychange", function(){
            if (document.visibilityState === "visible") {
              try { reg.update(); } catch(e){}
            }
          });
        })
        .catch(function(err){ __log.warn("[SW] register failed:", err); });
    });
  })();
  // A2HS(홈 화면 추가) 프롬프트 — beforeinstallprompt 이벤트 저장
  window.__installPromptEvent = null;
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    window.__installPromptEvent = e;
    window.dispatchEvent(new CustomEvent("pwa-installable"));
  });
  window.addEventListener("appinstalled", () => {
    window.__installPromptEvent = null;
    console.log("[PWA] installed");
  });
</script>

const BACKUP_KEYS = [
  "portfolio_v1",
  "user_settings_v1",
  "live_prices_cache_v1",
  "investment_notes_v1",
  "displayCurrency",
  "anthropic_api_key"

function exportAllData() {
  const dump = { schema: "hawiidad-backup-v1", exportedAt: new Date().toISOString(), data: {} };
  for (const k of BACKUP_KEYS) {
    try {
      const v = localStorage.getItem(k);
      if (v !== null) dump.data[k] = v;
    } catch (e) {}
  }
  const blob = new Blob([JSON.stringify(dump, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  a.href = url; a.download = `hawiidad-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return Object.keys(dump.data).length;
}
async function importAllData(file) {
  const text = await file.text();
  const parsed = JSON.parse(text);
  if (!parsed || parsed.schema !== "hawiidad-backup-v1" || !parsed.data) {
    throw new Error("백업 파일 형식이 올바르지 않습니다");
  }
  let n = 0;
  for (const [k, v] of Object.entries(parsed.data)) {

    }
  }
  return n;
}
